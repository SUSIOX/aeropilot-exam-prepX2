<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroPilot SPL Prep</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23ff6b35'/%3E%3Cstop offset='100%25' style='stop-color:%23ff8c42'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' fill='%231a1a1a'/%3E%3Cpath d='M20 50 L30 40 L30 45 L50 45 L50 35 L55 35 L55 45 L75 45 L75 40 L85 50 L75 60 L75 55 L55 55 L55 65 L50 65 L50 55 L30 55 L30 60 Z' fill='url(%23a)'/%3E%3Ccircle cx='50' cy='50' r='45' fill='none' stroke='%23ff6b35' stroke-width='2' opacity='0.3'/%3E%3C/svg%3E" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-muted: #8a9bb0;
            --border: #e2e6ea;
            --accent: #0f3460;
            --accent-hover: #16213e;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --skipped: #f39c12;
            --badge-bg: #eef2f7;
            --shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }
        
        /* Copy-friendly text selection */
        ::selection {
            background: rgba(15, 52, 96, 0.2);
            color: var(--text);
        }
        
        .question, .option-text {
            cursor: text;
        }
        /* Header - Gradient style */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            color: #fff;
            padding: 24px 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,.35);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .btn-reset-header {
            padding: 8px 10px;
            border: 1px solid rgba(231, 76, 60, 0.4);
            background: rgba(231, 76, 60, 0.15);
            color: var(--wrong);
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        
        .btn-reset-header:hover {
            background: var(--wrong);
            color: white;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .logo-text h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }
        
        .logo-text p {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        
        /* Main container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        
        /* Controls bar */
        .controls-bar {
            background: #fff;
            border-bottom: 1px solid #e2e6ea;
            padding: 12px 32px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 6px rgba(0,0,0,.08);
        }
        
        /* Stats bar in header - compact */
        .stats-bar {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(4px);
            border-radius: 6px;
            padding: 6px 10px;
            text-align: center;
            border-left: 2px solid rgba(255,255,255,0.3);
            min-width: 55px;
            flex: 0 0 auto;
        }
        
        .stat-card.correct { border-left-color: var(--correct); }
        .stat-card.wrong { border-left-color: var(--wrong); }
        
        .stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        
        .stat-card.correct .stat-value { color: var(--correct); }
        .stat-card.wrong .stat-value { color: var(--wrong); }
        
        .stat-label {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        /* Filters */
        .filters-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .category-select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            background: white;
            color: var(--text);
            cursor: pointer;
            min-width: 200px;
            flex: 1;
            max-width: 300px;
        }
        
        .category-select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-reset {
            padding: 8px 16px;
            border: 1px solid var(--wrong);
            background: rgba(231, 76, 60, 0.08);
            color: var(--wrong);
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        
        .btn-reset:hover {
            background: var(--wrong);
            color: white;
        }
        
        .btn-reset:active {
            transform: scale(0.97);
        }
        
        .filter-btn {
            padding: 7px 16px;
            border: 1px solid var(--border);
            background: white;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .filter-btn:hover {
            border-color: var(--accent);
            opacity: 0.88;
        }
        
        .filter-btn:active {
            transform: scale(0.97);
        }
        
        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        /* Question card */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 18px;
            box-shadow: var(--shadow);
            border-left: 4px solid #cfd8e3;
            transition: border-color 0.2s;
        }
        
        .card.answered-correct { border-left-color: var(--correct); }
        .card.answered-wrong { border-left-color: var(--wrong); }
        
        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .q-num {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-right: 6px;
        }
        
        .question {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.55;
            margin-bottom: 16px;
            color: var(--text);
        }
        
        .options {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            font-size: 0.92rem;
            line-height: 1.45;
            background: white;
        }
        
        .option:hover:not(.locked) {
            border-color: var(--accent);
            background: #f5f7ff;
        }
        
        .option.selected {
            border-color: var(--accent);
            background: #f5f7ff;
        }
        
        .option.correct {
            border-color: var(--correct);
            background: #eafaf1;
        }
        
        .option.wrong {
            border-color: var(--wrong);
            background: #fdedec;
        }
        
        .option-label {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            background: var(--badge-bg);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            margin-top: 1px;
        }
        
        .option:hover .option-label {
            background: var(--accent);
            color: white;
        }
        
        .option.correct .option-label {
            background: var(--correct);
            color: white;
        }
        
        .option.wrong .option-label {
            background: var(--wrong);
            color: white;
        }
        
        .option-text {
            flex: 1;
        }
        /* Result */
        .result {
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.correct {
            background: #eafaf1;
            color: #1a7a42;
        }
        
        .result.wrong {
            background: #fdedec;
            color: #922b21;
        }
        
        /* Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        
        .btn {
            padding: 7px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn:hover {
            opacity: 0.88;
        }
        
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        
        .progress {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        /* Loading & Error */
        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 4rem;
            font-size: 1.1rem;
        }
        
        .error {
            text-align: center;
            color: var(--wrong);
            padding: 4rem;
            font-size: 1.1rem;
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 40px;
        }
        
        .copy-hint {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--badge-bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 16px 20px;
            }
            
            .logo-text h1 {
                font-size: 1.2rem;
            }
            
            .container {
                padding: 16px;
            }
            
            .card {
                padding: 18px 20px;
            }
            
            .question {
                font-size: 0.95rem;
            }
            
            .controls {
                flex-direction: column;
                gap: 10px;
            }
            
            .controls .btn {
                width: 100%;
                text-align: center;
            }
            
            .filters-container {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">A</div>
                <div class="logo-text">
                    <h1>AeroPilot SPL Prep</h1>
                    <p>Procvičování otázek na pilotní průkaz</p>
                </div>
            </div>
            <div class="header-right">
                <div class="stats-bar" id="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="total-count">0</div>
                        <div class="stat-label">Celkem</div>
                    </div>
                    <div class="stat-card correct">
                        <div class="stat-value" id="correct-count">0</div>
                        <div class="stat-label">Správně</div>
                    </div>
                    <div class="stat-card wrong">
                        <div class="stat-value" id="wrong-count">0</div>
                        <div class="stat-label">Špatně</div>
                    </div>
                </div>
                <button class="btn-reset-header" onclick="resetQuiz()" title="Vymazat postup a začít znovu">🗑️</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="filters-row">
            <select class="category-select" id="category-select" onchange="filterCategory(this.value)">
                <option value="all">Všechny kategorie</option>
            </select>
        </div>

        <div id="quiz-content">
            <div class="loading">Načítání otázek...</div>
        </div>
    </div>
    
    <footer>
        <div class="copy-hint">💡 Označ text myší pro kopírování</div>
        <div>AeroPilot SPL Prep &copy; 2026 • Splň standardy EASA • Česká republika</div>
    </footer>

    <script>
        let allQuestions = [];
        let currentQuestions = [];
        let currentIndex = 0;
        let answered = false;
        let correctCount = 0;
        let wrongCount = 0;
        let currentCategory = 'all';

        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error('Nepodařilo se načíst otázky');
                allQuestions = await response.json();
                
                // Try to load saved state
                const saved = loadQuizState();
                if (saved) {
                    currentCategory = saved.currentCategory;
                    correctCount = saved.correctCount;
                    wrongCount = saved.wrongCount;
                    // Will set currentIndex after filtering
                }
                
                // Apply saved filter or default to all
                currentQuestions = currentCategory === 'all' 
                    ? [...allQuestions] 
                    : allQuestions.filter(q => q.category === currentCategory);
                shuffleArray(currentQuestions);
                
                // Restore index after shuffle (approximate position)
                if (saved && saved.currentIndex < currentQuestions.length) {
                    currentIndex = saved.currentIndex;
                }
                
                createFilters();
                updateStats();
                showQuestion();
            } catch (error) {
                document.getElementById('quiz-content').innerHTML = 
                    `<div class="error">Chyba: ${error.message}</div>`;
            }
        }

        function createFilters() {
            const categories = [...new Set(allQuestions.map(q => q.category))];
            const select = document.getElementById('category-select');
            
            // Keep the "all" option, add categories
            select.innerHTML = `
                <option value="all">Všechny kategorie</option>
                ${categories.map(cat => 
                    `<option value="${cat}">${cat.split(' SPL')[0]}</option>`
                ).join('')}
            `;
            
            // Set current selection
            select.value = currentCategory;
        }

        function filterCategory(category) {
            currentCategory = category;
            currentQuestions = category === 'all' 
                ? [...allQuestions] 
                : allQuestions.filter(q => q.category === category);
            shuffleArray(currentQuestions);
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            answered = false;
            
            // Update select value
            document.getElementById('category-select').value = category;
            
            updateStats();
            saveQuizState();
            showQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function updateStats() {
            const totalEl = document.getElementById('total-count');
            const correctEl = document.getElementById('correct-count');
            const wrongEl = document.getElementById('wrong-count');
            
            if (totalEl) totalEl.textContent = currentQuestions.length;
            if (correctEl) correctEl.textContent = correctCount;
            if (wrongEl) wrongEl.textContent = wrongCount;
        }

        // Save/load quiz state
        function saveQuizState() {
            const state = {
                currentIndex,
                currentCategory,
                correctCount,
                wrongCount,
                timestamp: Date.now()
            };
            localStorage.setItem('splQuizState', JSON.stringify(state));
        }

        function loadQuizState() {
            const saved = localStorage.getItem('splQuizState');
            if (!saved) return null;
            
            const state = JSON.parse(saved);
            // Clear old data (older than 7 days)
            const MAX_AGE_DAYS = 7;
            const age = (Date.now() - state.timestamp) / (1000 * 60 * 60 * 24);
            if (age > MAX_AGE_DAYS) {
                localStorage.removeItem('splQuizState');
                return null;
            }
            return state;
        }

        function resetQuiz() {
            if (!confirm('Opravdu chcete vymazat postup a začít znovu?')) return;
            
            localStorage.removeItem('splQuizState');
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            currentCategory = 'all';
            answered = false;
            
            // Reload questions
            currentQuestions = [...allQuestions];
            shuffleArray(currentQuestions);
            
            // Update select
            document.getElementById('category-select').value = 'all';
            
            updateStats();
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestions.length === 0) {
                document.getElementById('quiz-content').innerHTML = 
                    '<div class="card">Žádné otázky k zobrazení</div>';
                return;
            }

            const q = currentQuestions[currentIndex];
            answered = false;

            document.getElementById('quiz-content').innerHTML = `
                <div class="card" id="current-card">
                    <div class="category-badge">
                        <span class="q-num">${currentIndex + 1}/${currentQuestions.length}</span>
                        ${q.category.split(' SPL')[0]}
                    </div>
                    <div class="question">${escapeHtml(q.question)}</div>
                    <div class="options">
                        ${q.options.map(opt => `
                            <div class="option" onclick="selectOption('${opt.label}')" data-label="${opt.label}">
                                <span class="option-label">${opt.label}</span>
                                <span class="option-text">${escapeHtml(opt.text)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="result" id="result"></div>
                    <div class="controls">
                        <button class="btn btn-secondary" onclick="prevQuestion()">← Předchozí</button>
                        <button class="btn btn-primary" onclick="nextQuestion()">Další →</button>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function selectOption(label) {
            const q = currentQuestions[currentIndex];
            
            // If already answered, clicking correct answer goes to next question
            if (answered) {
                if (q.correct_labels.includes(label)) {
                    nextQuestion();
                }
                return;
            }
            
            // Don't trigger if user is selecting text
            const selection = window.getSelection();
            if (selection && selection.toString().trim().length > 0) {
                return;
            }
            
            answered = true;

            const isCorrect = q.correct_labels.includes(label);

            if (isCorrect) correctCount++;
            else wrongCount++;
            updateStats();
            saveQuizState();

            // Add border color to card
            const card = document.getElementById('current-card');
            if (card) {
                card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
            }

            document.querySelectorAll('.option').forEach(opt => {
                const optLabel = opt.dataset.label;
                opt.classList.remove('selected');
                opt.classList.add('locked');
                
                if (q.correct_labels.includes(optLabel)) {
                    opt.classList.add('correct');
                    // Keep click handler on correct answer to go to next
                    opt.style.cursor = 'pointer';
                } else if (optLabel === label && !isCorrect) {
                    opt.classList.add('wrong');
                    opt.onclick = null;
                    opt.style.cursor = 'default';
                } else {
                    opt.onclick = null;
                    opt.style.cursor = 'default';
                }
            });

            const resultDiv = document.getElementById('result');
            resultDiv.className = `result show ${isCorrect ? 'correct' : 'wrong'}`;
            resultDiv.innerHTML = isCorrect 
                ? '✓ Správně!' 
                : `✗ Špatně! Správná odpověď: ${q.correct_labels.join(', ')}`;
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                saveQuizState();
                showQuestion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }

        loadQuestions();
    </script>
</body>
</html>
