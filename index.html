<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPL Test - Procvičování otázek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        header p {
            opacity: 0.9;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-box {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .category-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .question {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .option.selected {
            border-color: #667eea;
            background: #f0f3ff;
        }
        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }
        .option.wrong {
            border-color: #f44336;
            background: #ffebee;
        }
        .option-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            font-weight: 600;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .option.correct .option-label {
            background: #4caf50;
        }
        .option.wrong .option-label {
            background: #f44336;
        }
        .option-text {
            flex: 1;
            font-size: 1rem;
            color: #444;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .result.wrong {
            background: #ffebee;
            color: #c62828;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .progress {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }
        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: #667eea;
        }
        .loading {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2rem;
        }
        .error {
            text-align: center;
            color: #ff6b6b;
            padding: 40px;
            font-size: 1.1rem;
        }
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }
            .question {
                font-size: 1rem;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛫 SPL Test</h1>
            <p>Procvičování otázek na pilotní průkaz</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-box">Celkem: <span id="total-count">0</span></div>
            <div class="stat-box">Správně: <span id="correct-count">0</span></div>
            <div class="stat-box">Špatně: <span id="wrong-count">0</span></div>
        </div>

        <div class="filters" id="filters"></div>

        <div id="quiz-content">
            <div class="loading">Načítání otázek...</div>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let currentQuestions = [];
        let currentIndex = 0;
        let answered = false;
        let correctCount = 0;
        let wrongCount = 0;
        let currentCategory = 'all';

        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error('Nepodařilo se načíst otázky');
                allQuestions = await response.json();
                currentQuestions = [...allQuestions];
                shuffleArray(currentQuestions);
                createFilters();
                updateStats();
                showQuestion();
            } catch (error) {
                document.getElementById('quiz-content').innerHTML = 
                    `<div class="error">Chyba: ${error.message}</div>`;
            }
        }

        function createFilters() {
            const categories = [...new Set(allQuestions.map(q => q.category))];
            const filtersDiv = document.getElementById('filters');
            
            filtersDiv.innerHTML = `
                <button class="filter-btn active" onclick="filterCategory('all')">Vše</button>
                ${categories.map(cat => 
                    `<button class="filter-btn" onclick="filterCategory('${cat}')">${cat.split(' SPL')[0]}</button>`
                ).join('')}
            `;
        }

        function filterCategory(category) {
            currentCategory = category;
            currentQuestions = category === 'all' 
                ? [...allQuestions] 
                : allQuestions.filter(q => q.category === category);
            shuffleArray(currentQuestions);
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            answered = false;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', 
                    (category === 'all' && btn.textContent === 'Vše') || 
                    btn.textContent === category.split(' SPL')[0]
                );
            });
            
            updateStats();
            showQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function updateStats() {
            document.getElementById('total-count').textContent = currentQuestions.length;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('wrong-count').textContent = wrongCount;
        }

        function showQuestion() {
            if (currentQuestions.length === 0) {
                document.getElementById('quiz-content').innerHTML = 
                    '<div class="card">Žádné otázky k zobrazení</div>';
                return;
            }

            const q = currentQuestions[currentIndex];
            answered = false;

            document.getElementById('quiz-content').innerHTML = `
                <div class="card">
                    <span class="category-badge">${q.category}</span>
                    <div class="question">${escapeHtml(q.question)}</div>
                    <div class="options">
                        ${q.options.map(opt => `
                            <div class="option" onclick="selectOption('${opt.label}')" data-label="${opt.label}">
                                <span class="option-label">${opt.label}</span>
                                <span class="option-text">${escapeHtml(opt.text)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="result" id="result"></div>
                    <div class="controls">
                        <button class="btn btn-secondary" onclick="prevQuestion()">← Předchozí</button>
                        <span class="progress">Otázka ${currentIndex + 1} / ${currentQuestions.length}</span>
                        <button class="btn btn-primary" onclick="nextQuestion()">Další →</button>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function selectOption(label) {
            if (answered) return;
            answered = true;

            const q = currentQuestions[currentIndex];
            const isCorrect = q.correct_labels.includes(label);

            if (isCorrect) correctCount++;
            else wrongCount++;
            updateStats();

            document.querySelectorAll('.option').forEach(opt => {
                const optLabel = opt.dataset.label;
                opt.classList.remove('selected');
                
                if (q.correct_labels.includes(optLabel)) {
                    opt.classList.add('correct');
                } else if (optLabel === label && !isCorrect) {
                    opt.classList.add('wrong');
                }
                opt.onclick = null;
                opt.style.cursor = 'default';
            });

            const resultDiv = document.getElementById('result');
            resultDiv.className = `result show ${isCorrect ? 'correct' : 'wrong'}`;
            resultDiv.innerHTML = isCorrect 
                ? '✓ Správně!' 
                : `✗ Špatně! Správná odpověď: ${q.correct_labels.join(', ')}`;
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                showQuestion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                showQuestion();
            }
        }

        loadQuestions();
    </script>
</body>
</html>
